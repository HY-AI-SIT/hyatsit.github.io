<script>
const TC = {fire:{grass:2,ice:2,bug:2,steel:2,water:0.5,fire:0.5,rock:0.5,dragon:0.5},water:{fire:2,ground:2,rock:2,water:0.5,grass:0.5,dragon:0.5},electric:{water:2,flying:2,electric:0.5,grass:0.5,dragon:0.5,ground:0},grass:{water:2,ground:2,rock:2,fire:0.5,grass:0.5,poison:0.5,flying:0.5,bug:0.5,dragon:0.5,steel:0.5},ice:{grass:2,ground:2,flying:2,dragon:2,fire:0.5,water:0.5,ice:0.5,steel:0.5},fighting:{normal:2,ice:2,rock:2,dark:2,steel:2,poison:0.5,flying:0.5,psychic:0.5,bug:0.5,ghost:0,fairy:0.5},poison:{grass:2,fairy:2,poison:0.5,ground:0.5,rock:0.5,ghost:0.5,steel:0},ground:{fire:2,electric:2,poison:2,rock:2,steel:2,grass:0.5,bug:0.5,flying:0},flying:{grass:2,fighting:2,bug:2,electric:0.5,rock:0.5,steel:0.5},psychic:{fighting:2,poison:2,psychic:0.5,dark:0,steel:0.5},bug:{grass:2,psychic:2,dark:2,fire:0.5,fighting:0.5,poison:0.5,flying:0.5,ghost:0.5,steel:0.5,fairy:0.5},rock:{fire:2,ice:2,flying:2,bug:2,fighting:0.5,ground:0.5,steel:0.5},ghost:{psychic:2,ghost:2,normal:0,dark:0.5},dragon:{dragon:2,steel:0.5,fairy:0},dark:{psychic:2,ghost:2,fighting:0.5,dark:0.5,fairy:0.5},steel:{ice:2,rock:2,fairy:2,fire:0.5,water:0.5,electric:0.5,steel:0.5},fairy:{fighting:2,dragon:2,dark:2,fire:0.5,poison:0.5,steel:0.5},normal:{rock:0.5,steel:0.5,ghost:0}};
const TYPE_COLORS = {fire:'#F08030',water:'#6890F0',grass:'#78C850',electric:'#F8D030',psychic:'#F85888',ice:'#98D8D8',dragon:'#7038F8',dark:'#705848',fairy:'#EE99AC',normal:'#A8A878',fighting:'#C03028',poison:'#A040A0',ground:'#E0C068',flying:'#A890F0',bug:'#A8B820',rock:'#B8A038',ghost:'#705898',steel:'#B8B8D0'};

// Stat abbreviations for display
const STAT_ABBR = {attack:'Atk',defense:'Def',spAtk:'SpA',spDef:'SpD',speed:'Spe'};

// Stage multiplier label e.g. x1.5, x0.67
function stageLabel(stage) {
  const m = stageMultiplier(stage);
  return (m>=1?'x':'x')+m.toFixed(2).replace(/\.?0+$/,'');
}

// Field conditions state
let field = {};
function resetField() {
  field = {
    weather: null,       // 'sun','rain','sand','hail' + turns remaining
    weatherTurns: 0,
    trickRoom: false, trickRoomTurns: 0,
    terrain: null,       // 'electric','grassy','misty','psychic'
    terrainTurns: 0,
    yourTailwind: false, yourTailwindTurns: 0,
    foeTailwind: false,  foeTailwindTurns: 0,
    yourLightScreen: false, yourLightScreenTurns: 0,
    foeLightScreen: false,  foeLightScreenTurns: 0,
    yourReflect: false, yourReflectTurns: 0,
    foeReflect: false,  foeReflectTurns: 0,
    yourAuroraVeil: false, yourAuroraVeilTurns: 0,
    foeAuroraVeil: false,  foeAuroraVeilTurns: 0,
  };
}

// Field condition tag definitions: key -> {label, color, emoji}
const FIELD_DEFS = {
  sun:           {label:'Harsh Sun',      color:'#F08030', emoji:'☀️'},
  rain:          {label:'Rain',           color:'#6890F0', emoji:'🌧️'},
  sand:          {label:'Sandstorm',      color:'#B8A038', emoji:'🌪️'},
  hail:          {label:'Hail',           color:'#98D8D8', emoji:'❄️'},
  trickRoom:     {label:'Trick Room',     color:'#7038F8', emoji:'🔮'},
  electric:      {label:'Electric Terrain',color:'#F8D030',emoji:'⚡'},
  grassy:        {label:'Grassy Terrain', color:'#78C850', emoji:'🌿'},
  misty:         {label:'Misty Terrain',  color:'#EE99AC', emoji:'🌸'},
  psychic:       {label:'Psychic Terrain',color:'#F85888', emoji:'🧠'},
  yourTailwind:  {label:'Your Tailwind',  color:'#A890F0', emoji:'💨'},
  foeTailwind:   {label:'Foe Tailwind',   color:'#A890F0', emoji:'💨'},
  yourLightScreen:{label:'Your Lt.Screen',color:'#F8D030', emoji:'🛡️'},
  foeLightScreen: {label:'Foe Lt.Screen', color:'#F8D030', emoji:'🛡️'},
  yourReflect:   {label:'Your Reflect',   color:'#6890F0', emoji:'🪞'},
  foeReflect:    {label:'Foe Reflect',    color:'#6890F0', emoji:'🪞'},
  yourAuroraVeil:{label:'Your Aurora Veil',color:'#98D8D8',emoji:'🌈'},
  foeAuroraVeil: {label:'Foe Aurora Veil',color:'#98D8D8',emoji:'🌈'},
};

function renderFieldBar() {
  const bar = document.getElementById('field-bar');
  const tags = [];
  // Weather
  if (field.weather) {
    const d = FIELD_DEFS[field.weather];
    tags.push({key:field.weather, label:d.label, color:d.color, emoji:d.emoji, turns:field.weatherTurns});
  }
  // Trick Room
  if (field.trickRoom) tags.push({key:'trickRoom', ...FIELD_DEFS.trickRoom, turns:field.trickRoomTurns});
  // Terrain
  if (field.terrain) {
    const d = FIELD_DEFS[field.terrain];
    tags.push({key:field.terrain, label:d.label, color:d.color, emoji:d.emoji, turns:field.terrainTurns});
  }
  // Side conditions
  const sides = ['yourTailwind','foeTailwind','yourLightScreen','foeLightScreen','yourReflect','foeReflect','yourAuroraVeil','foeAuroraVeil'];
  for (const k of sides) {
    if (field[k]) tags.push({key:k, ...FIELD_DEFS[k], turns:field[k+'Turns']});
  }
  bar.innerHTML = tags.map(t =>
    `<span class="field-tag" style="background:${t.color}">${t.emoji} ${t.label}<span class="ft-turns"> ${t.turns}t</span></span>`
  ).join('');
}

function renderStageDisplay(who, poke) {
  const el = document.getElementById(who+'-stages');
  if (!el) return;
  const stages = poke.stages || {};
  const pills = [];
  for (const [stat, abbr] of Object.entries(STAT_ABBR)) {
    const s = stages[stat] || 0;
    if (s !== 0) {
      const label = abbr + ' ' + stageLabel(s);
      pills.push(`<span class="stage-pill ${s>0?'stage-up':'stage-down'}">${s>0?'▲':'▼'} ${label}</span>`);
    }
  }
  el.innerHTML = pills.join('');
}

// ── Field-effect move tables ──────────────────────────────────────────────
const WEATHER_MOVES = {
  'sunny-day':'sun','drought':'sun','desolate-land':'sun',
  'rain-dance':'rain','drizzle':'rain','primordial-sea':'rain',
  'sandstorm':'sand','sand-stream':'sand','sand-spit':'sand',
  'hail':'hail','snow-warning':'hail','snowscape':'hail',
};
const TERRAIN_MOVES = {
  'electric-terrain':'electric','rising-voltage':'electric',
  'grassy-terrain':'grassy','grassy-glide':'grassy',
  'misty-terrain':'misty','misty-explosion':'misty',
  'psychic-terrain':'psychic','expanding-force':'psychic',
};
const SCREEN_MOVES_YOUR = ['light-screen','reflect','aurora-veil'];
const SCREEN_MOVES_FOE  = ['light-screen','reflect','aurora-veil']; // same names, side determined by who uses it

function applyFieldMove(moveName, atkWho) {
  const isYour = atkWho === 'p';
  // Weather
  if (WEATHER_MOVES[moveName]) {
    field.weather = WEATHER_MOVES[moveName];
    field.weatherTurns = 5;
    return true;
  }
  // Terrain
  if (TERRAIN_MOVES[moveName]) {
    field.terrain = TERRAIN_MOVES[moveName];
    field.terrainTurns = 5;
    return true;
  }
  // Trick Room
  if (moveName === 'trick-room') {
    field.trickRoom = !field.trickRoom;
    field.trickRoomTurns = field.trickRoom ? 5 : 0;
    return true;
  }
  // Tailwind
  if (moveName === 'tailwind') {
    if (isYour) { field.yourTailwind=true; field.yourTailwindTurns=4; }
    else        { field.foeTailwind=true; field.foeTailwindTurns=4; }
    return true;
  }
  // Light Screen
  if (moveName === 'light-screen') {
    if (isYour) { field.yourLightScreen=true; field.yourLightScreenTurns=5; }
    else        { field.foeLightScreen=true; field.foeLightScreenTurns=5; }
    return true;
  }
  // Reflect
  if (moveName === 'reflect') {
    if (isYour) { field.yourReflect=true; field.yourReflectTurns=5; }
    else        { field.foeReflect=true; field.foeReflectTurns=5; }
    return true;
  }
  // Aurora Veil
  if (moveName === 'aurora-veil') {
    if (isYour) { field.yourAuroraVeil=true; field.yourAuroraVeilTurns=5; }
    else        { field.foeAuroraVeil=true; field.foeAuroraVeilTurns=5; }
    return true;
  }
  return false;
}

function tickField() {
  // Tick weather
  if (field.weather) {
    field.weatherTurns--;
    if (field.weatherTurns<=0) { field.weather=null; field.weatherTurns=0; }
  }
  // Tick trick room
  if (field.trickRoom) {
    field.trickRoomTurns--;
    if (field.trickRoomTurns<=0) { field.trickRoom=false; field.trickRoomTurns=0; }
  }
  // Tick terrain
  if (field.terrain) {
    field.terrainTurns--;
    if (field.terrainTurns<=0) { field.terrain=null; field.terrainTurns=0; }
  }
  // Tick side conditions
  const sides = ['yourTailwind','foeTailwind','yourLightScreen','foeLightScreen','yourReflect','foeReflect','yourAuroraVeil','foeAuroraVeil'];
  for (const k of sides) {
    if (field[k]) {
      field[k+'Turns']--;
      if (field[k+'Turns']<=0) { field[k]=false; field[k+'Turns']=0; }
    }
  }
}

function calcHP(base) { return Math.floor((2*base+31)*50/100)+50+10; }
function calcStat(base) { return Math.floor((Math.floor((2*base+31)*50/100)+5)); }
function cap(s) { return s?s.charAt(0).toUpperCase()+s.slice(1).replace(/-/g,' '):''; }
function wait(ms) { return new Promise(r=>setTimeout(r,ms)); }
function getEff(mtype, defTypes) { let m=1; defTypes.forEach(t=>{m*=(TC[mtype]?.[t]??1);}); return m; }

let yourTeam = [], foeTeam = [], yourIdx = 0, foeIdx = 0, potions = 3, busy = false, lockedMove = null, foeLocked = null;

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

async function newBattle() {
  document.getElementById('pb-game').style.display='none';
  document.getElementById('pb-loading').style.display='block';
  document.getElementById('no-team').style.display='none';
  busy=true;
  let saved=[];
  try { saved=JSON.parse(localStorage.getItem('pokeTeam')||'[]'); } catch(e){}
  if (!saved.length) { document.getElementById('pb-loading').style.display='none'; document.getElementById('no-team').style.display='block'; return; }
  yourTeam = deepClone(saved).map(p=>({...p,currentHP:p.maxHP,fainted:false,sashUsed:false,berryUsed:false,flinched:false,stages:{attack:0,defense:0,spAtk:0,spDef:0,speed:0},protecting:false}));
  foeTeam = await buildFoeTeam();
  yourIdx=0; foeIdx=0; potions=3; lockedMove=null; foeLocked=null;
  resetField();
  document.getElementById('btn-potion').textContent='Potion (3)';
  document.getElementById('pb-loading').style.display='none';
  document.getElementById('pb-game').style.display='block';
  renderTeamIcons();
  renderActive();
  renderMoves();
  renderFieldBar();
  log('A wild team appeared! Go ' + cap(yourTeam[0].name) + '!');
  busy=false;
}

async function buildFoeTeam() {
  const ids = [];
  while (ids.length < 6) { const n=Math.floor(Math.random()*151)+1; if(!ids.includes(n)) ids.push(n); }
  const team = await Promise.all(ids.map(id => fetchFoePokemon(id)));
  return team;
}

async function fetchFoePokemon(id) {
  const r = await fetch('https://pokeapi.co/api/v2/pokemon/'+id);
  const d = await r.json();
  const stats = {}; d.stats.forEach(s=>{stats[s.stat.name]=s.base_stat;});
  const moveCandidates = d.moves.filter(m=>m.version_group_details.some(v=>v.move_learn_method.name==='level-up'&&v.level_learned_at<=50)).slice(0,8);
  const moveData = await Promise.all(moveCandidates.slice(0,4).map(async m=>{
    try {
      const mr=await fetch(m.move.url); const md=await mr.json();
      const effEntry=md.effect_entries?md.effect_entries.find(e=>e.language.name==='en'):null;
      return {name:md.name,type:md.type.name,power:md.power??null,accuracy:md.accuracy??100,pp:md.pp||10,maxPP:md.pp||10,damageClass:md.damage_class.name,desc:effEntry?effEntry.short_effect:'—',statChanges:(md.stat_changes||[]).map(sc=>({stat:sc.stat.name,change:sc.change})),metaCategory:md.meta?.category?.name||'',moveTarget:md.target?.name||'selected-pokemon',heal:md.meta?.healing||0,statChangeToSelf:md.target?.name==='user',minHits:md.meta?.min_hits??null,maxHits:md.meta?.max_hits??null,flinchChance:md.meta?.flinch_chance||0};
    } catch(e) { return {name:'tackle',type:'normal',power:40,accuracy:100,pp:35,maxPP:35,damageClass:'physical',desc:'Tackle',statChanges:[],minHits:null,maxHits:null}; }
  }));
  const moves = moveData.length ? moveData : [{name:'tackle',type:'normal',power:40,accuracy:100,pp:35,maxPP:35,damageClass:'physical',desc:'Tackle',statChanges:[],minHits:null,maxHits:null}];
  return {
    id, name:d.name, sprite:d.sprites.front_default, backSprite:d.sprites.back_default||d.sprites.front_default,
    types:d.types.map(t=>t.type.name), moves, item:{name:'None',effect:'none'},
    maxHP:calcHP(stats.hp||45), currentHP:calcHP(stats.hp||45),
    attack:calcStat(stats.attack||45), defense:calcStat(stats.defense||45),
    spAtk:calcStat(stats['special-attack']||45), spDef:calcStat(stats['special-defense']||45),
    speed:calcStat(stats.speed||45), fainted:false, sashUsed:false, berryUsed:false, flinched:false,
    stages:{attack:0,defense:0,spAtk:0,spDef:0,speed:0}, protecting:false, canEvolve:false,
  };
}

function setAllDisabled(v) {
  document.querySelectorAll('.move-btn').forEach(b=>b.disabled=v);
  document.getElementById('btn-potion').disabled=v;
}

function stageMultiplier(stage) { const s=Math.max(-6,Math.min(6,stage||0)); return s>=0?(2+s)/2:2/(2-s); }

function calcDamage(move, atk, def) {
  if (!move.power) return 0;
  const A = move.damageClass==='physical' ? atk.attack*stageMultiplier(atk.stages?.attack) : atk.spAtk*stageMultiplier(atk.stages?.spAtk);
  const D = move.damageClass==='physical' ? def.defense*stageMultiplier(def.stages?.defense) : def.spDef*stageMultiplier(def.stages?.spDef);
  const stab = atk.types.includes(move.type) ? 1.5 : 1;
  const eff = getEff(move.type, def.types);
  let atkMult = 1;
  if (atk.item) {
    if (atk.item.effect==='choiceband'&&move.damageClass==='physical') atkMult=1.5;
    if (atk.item.effect==='choicespecs'&&move.damageClass==='special') atkMult=1.5;
    if (atk.item.effect==='lifeorb') atkMult=1.3;
  }
  let defMult = 1;
  if (def.item) {
    if (def.item.effect==='assaultvest'&&move.damageClass==='special') defMult=1.5;
    if (def.item.effect==='eviolite'&&def.canEvolve) defMult=1.5;
  }
  // Weather boosts
  if (field.weather==='sun')  { if (move.type==='fire') atkMult*=1.5; if (move.type==='water') atkMult*=0.5; }
  if (field.weather==='rain') { if (move.type==='water') atkMult*=1.5; if (move.type==='fire') atkMult*=0.5; }
  // Terrain boosts (grounded pokemon — simplified: non-flying types)
  const defGrounded = !def.types.includes('flying');
  const atkGrounded = !atk.types.includes('flying');
  if (field.terrain==='electric' && move.type==='electric' && atkGrounded) atkMult*=1.3;
  if (field.terrain==='grassy'   && move.type==='grass'    && atkGrounded) atkMult*=1.3;
  if (field.terrain==='psychic'  && move.type==='psychic'  && atkGrounded) atkMult*=1.3;
  if (field.terrain==='misty'    && move.type==='dragon'   && defGrounded) atkMult*=0.5;
  // Screens
  const atkIsYour = atk === yourPoke();
  const defIsYour = def === yourPoke();
  if (move.damageClass==='special') {
    if (defIsYour  && (field.yourLightScreen || field.yourAuroraVeil)) defMult*=1.5;
    if (!defIsYour && (field.foeLightScreen  || field.foeAuroraVeil))  defMult*=1.5;
  }
  if (move.damageClass==='physical') {
    if (defIsYour  && (field.yourReflect     || field.yourAuroraVeil)) defMult*=1.5;
    if (!defIsYour && (field.foeReflect      || field.foeAuroraVeil))  defMult*=1.5;
  }
  const rng=0.85+Math.random()*0.15;
  const base=Math.floor(Math.floor(Math.floor(2*50/5+2)*move.power*(A*atkMult)/Math.max(1,D*defMult)/50)+2);
  return Math.max(1,Math.floor(base*stab*eff*rng));
}

function effText(eff) { if(eff>=4) return "It's super duper effective!"; if(eff>=2) return "It's super effective!"; if(eff===0) return "It had no effect..."; if(eff<1) return "It's not very effective..."; return ""; }

async function takeTurn(moveIdx) {
  if (busy) return;
  busy=true; setAllDisabled(true);
  const yp=yourPoke(), fp=foePoke();
  const ym=yp.moves[moveIdx];
  if (!ym || ym.pp<=0) { busy=false; setAllDisabled(false); return; }
  if (yp.item?.effect==='assaultvest'&&!ym.power) { log(cap(yp.name)+' is holding Assault Vest and cannot use status moves!'); busy=false; setAllDisabled(false); return; }

  yp.protecting=false; fp.protecting=false;
  yp.flinched=false; fp.flinched=false;

  if (yp.item?.effect?.startsWith('choice') && lockedMove===null) lockedMove=moveIdx;

  // Speed with Tailwind and Trick Room
  let yourSpd=yp.speed*stageMultiplier(yp.stages?.speed)*(yp.item?.effect==='choicescarf'?1.5:1)*(field.yourTailwind?2:1);
  let foeSpd=fp.speed*stageMultiplier(fp.stages?.speed)*(fp.item?.effect==='choicescarf'?1.5:1)*(field.foeTailwind?2:1);
  let yourFirst = field.trickRoom ? yourSpd<=foeSpd : yourSpd>=foeSpd;

  if (yourFirst) {
    const done=await doMove(ym, yp, fp, 'p', 'e'); if(done) return;
    await wait(300);
    const done2=await enemyMove(); if(done2) return;
  } else {
    const done=await enemyMove(); if(done) return;
    await wait(300);
    const done2=await doMove(ym, yp, fp, 'p', 'e'); if(done2) return;
  }

  await endOfTurn();
  renderMoves();
  busy=false; setAllDisabled(false);
}

async function applyStatChange(sc, atk, def, atkWho, defWho, move) {
  const opponentTargets=['selected-pokemon','all-opponents','random-opponent','all-other-pokemon','all-pokemon'];
  const isSelfChange = move.moveTarget==='user' ||
    (sc.change < 0 && opponentTargets.includes(move.moveTarget)) ||
    (sc.change > 0 && opponentTargets.includes(move.moveTarget) && !['icy-wind','electroweb','bulldoze','rock-tomb','mud-shot','mud-slap','aurora-beam','growl','leer','tail-whip','smokescreen','sand-attack','flash','kinesis','sweet-scent','feather-dance','captivate','noble-roar','confide','parting-shot','spirit-break','mystical-fire','snarl'].includes(move.name));
  const tgt = isSelfChange ? atk : def;
  const tgtWho = isSelfChange ? atkWho : defWho;
  if (tgt.fainted) return;
  if (!tgt.stages) tgt.stages={attack:0,defense:0,spAtk:0,spDef:0,speed:0};
  const key=sc.stat==='special-attack'?'spAtk':sc.stat==='special-defense'?'spDef':sc.stat;
  const oldS=tgt.stages[key]||0;
  tgt.stages[key]=Math.max(-6,Math.min(6,oldS+sc.change));
  if (tgt.stages[key]!==oldS) {
    const dir=sc.change>0?'rose':'fell'; const mag=Math.abs(sc.change)>=2?' sharply':'';
    const newLabel = stageLabel(tgt.stages[key]);
    log(cap(tgt.name)+"'s "+sc.stat.replace(/-/g,' ')+mag+' '+dir+'! ('+STAT_ABBR[key]+' now '+newLabel+')');
    renderStageDisplay(tgtWho, tgt);
    await wait(700);
  }
}

async function doStatusMove(move, atk, def, atkWho, defWho) {
  // Field-changing status moves
  if (applyFieldMove(move.name, atkWho)) {
    const fieldNames = {
      'sunny-day':'The sunlight turned harsh!','rain-dance':'It started to rain!','sandstorm':'A sandstorm kicked up!','hail':'It started to hail!',
      'trick-room': field.trickRoom ? 'Dimensions were twisted!' : 'The twisted dimensions returned to normal!',
      'electric-terrain':'An electric current ran across the field!','grassy-terrain':'Grass grew to cover the field!',
      'misty-terrain':'Mist swirled around the battlefield!','psychic-terrain':'The battlefield got weird!',
      'tailwind':'The tailwind blew!','light-screen':'A wall of light cut special damage!',
      'reflect':'A wall of light cut physical damage!','aurora-veil':'A veil of light covered the battlefield!',
    };
    log(cap(atk.name)+' used '+cap(move.name)+'! '+(fieldNames[move.name]||''));
    renderFieldBar();
    await wait(800);
    return false;
  }
  // Protect / Detect
  if (['protect','detect','endure','wide-guard','quick-guard'].includes(move.name)||move.metaCategory==='protect') {
    atk.protecting=true;
    log(cap(atk.name)+' is protecting itself!'); await wait(700); return false;
  }
  // Healing moves
  if (move.metaCategory==='heal'||(move.heal&&move.heal>0)) {
    const heal=Math.floor(atk.maxHP*(move.heal||50)/100);
    atk.currentHP=Math.min(atk.maxHP,atk.currentHP+heal);
    updateHP(atkWho,atk);
    log(cap(atk.name)+' restored HP with '+cap(move.name)+'!'); await wait(700); return false;
  }
  // Stat changes
  if (move.statChanges&&move.statChanges.length>0) {
    log(cap(atk.name)+' used '+cap(move.name)+'!'); await wait(400);
    for (const sc of move.statChanges) {
      await applyStatChange(sc, atk, def, atkWho, defWho, move);
    }
    return false;
  }
  log(cap(atk.name)+' used '+cap(move.name)+'! But nothing happened...'); await wait(700); return false;
}

async function doMove(move, atk, def, atkWho, defWho) {
  // Flinch check — attacker couldn't move
  if (atk.flinched) {
    atk.flinched=false;
    log(cap(atk.name)+' flinched and couldn\'t move!');
    await wait(700); return false;
  }

  move.pp=Math.max(0,move.pp-1);

  // Protect check
  const selfTargeted = move.moveTarget==='user' || (move.statChanges?.length>0 && move.statChangeToSelf);
  if (def.protecting && !selfTargeted) {
    log(cap(atk.name)+' used '+cap(move.name)+'! But '+cap(def.name)+' is protecting itself!');
    await wait(700); return false;
  }

  if (!move.power) { return await doStatusMove(move,atk,def,atkWho,defWho); }
  const hit=Math.random()*100<=(move.accuracy??100);
  if (!hit) { log(cap(atk.name)+' used '+cap(move.name)+'... but it missed!'); await wait(700); return false; }

  // Determine hit count
  let numHits = 1;
  if (move.minHits && move.maxHits) {
    if (move.minHits===2 && move.maxHits===2) { numHits=2; }
    else if (move.minHits===3 && move.maxHits===3) { numHits=3; }
    else if (move.minHits===2 && move.maxHits===5) {
      const r=Math.random(); numHits=r<0.357?2:r<0.714?3:r<0.857?4:5;
    } else {
      numHits=move.minHits+Math.floor(Math.random()*(move.maxHits-move.minHits+1));
    }
  }

  const eff=getEff(move.type,def.types);
  let totalDmg=0;

  log(cap(atk.name)+' used '+cap(move.name)+'!');
  await wait(400);

  for (let hitN=0; hitN<numHits; hitN++) {
    if (def.currentHP<=0 || def.fainted) { numHits=hitN; break; }

    const dmg=calcDamage(move,atk,def);
    totalDmg+=dmg;

    // Focus Sash — survive a KO hit when at full HP
    const wouldBeKOd = def.currentHP - dmg <= 0;
    const atFullHP = def.currentHP > 0 && def.maxHP > 0 && def.currentHP >= def.maxHP;
    if (def.item?.effect==='focussash' && !def.sashUsed && atFullHP && wouldBeKOd) {
      def.currentHP=1; def.sashUsed=true;
      const effMsg=effText(eff);
      shake(defWho+'-sprite'); updateHP(defWho,def); renderTeamIcons();
      log((numHits>1?'Hit '+(hitN+1)+'! ':'')+cap(def.name)+'\'s Focus Sash activated! It hung on with 1 HP! '+effMsg);
      await wait(numHits>1?500:900);
    } else {
      def.currentHP=Math.max(0,def.currentHP-dmg);
      const effMsg=hitN===0?effText(eff):'';
      log((numHits>1?'Hit '+(hitN+1)+': ':'')+cap(def.name)+' took '+dmg+' damage! '+effMsg);
      shake(defWho+'-sprite'); updateHP(defWho,def); renderTeamIcons();
      await wait(numHits>1?500:900);
    }

    // Per-hit: Life Orb recoil
    if (atk.item?.effect==='lifeorb') {
      const recoil=Math.max(1,Math.floor(dmg/10));
      atk.currentHP=Math.max(0,atk.currentHP-recoil);
      updateHP(atkWho,atk);
    }
    // Per-hit: Rocky Helmet (contact only)
    if (def.item?.effect==='rockyhelmet'&&move.damageClass==='physical') {
      const rocky=Math.floor(atk.maxHP/6);
      atk.currentHP=Math.max(0,atk.currentHP-rocky);
      updateHP(atkWho,atk);
    }
  }

  if (numHits>1) { log('Hit '+numHits+' time(s)! Total: '+totalDmg+' damage!'); await wait(700); }

  // Flinch — roll once after all hits land
  if (move.flinchChance>0 && !def.fainted && def.currentHP>0 && Math.random()*100 < move.flinchChance) {
    def.flinched=true;
    log(cap(def.name)+' flinched!'); await wait(500);
  }

  // Shell Bell — once after all hits
  if (atk.item?.effect==='shellbell'&&totalDmg>0) {
    const heal=Math.floor(totalDmg/8);
    atk.currentHP=Math.min(atk.maxHP,atk.currentHP+heal);
    updateHP(atkWho,atk);
  }
  // Rocky Helmet log (single message after all hits)
  if (def.item?.effect==='rockyhelmet'&&move.damageClass==='physical'&&totalDmg>0) {
    log(cap(def.name)+"'s Rocky Helmet hurt "+cap(atk.name)+'!'); await wait(600);
  }

  // Stat changes after all hits
  if (move.statChanges?.length>0) {
    for (const sc of move.statChanges) {
      await applyStatChange(sc, atk, def, atkWho, defWho, move);
    }
  }

  if (def.currentHP<=0) {
    def.fainted=true;
    flash(defWho+'-sprite');
    log(cap(def.name)+' fainted!'); await wait(800);
    renderTeamIcons();
    return await handleFaint(defWho);
  }
  return false;
}

async function enemyMove() {
  const fp=foePoke(), yp=yourPoke();
  const avail=fp.moves.filter(m=>m.pp>0);
  if (!avail.length) { log('Wild '+cap(fp.name)+' has no moves left!'); return false; }
  let move;
  if (fp.item?.effect?.startsWith('choice')&&foeLocked!==null) {
    move=fp.moves[foeLocked]&&fp.moves[foeLocked].pp>0?fp.moves[foeLocked]:avail[0];
  } else {
    move=avail[Math.floor(Math.random()*avail.length)];
    if (fp.item?.effect?.startsWith('choice')&&foeLocked===null) foeLocked=fp.moves.indexOf(move);
  }
  return await doMove(move,fp,yp,'e','p');
}

async function endOfTurn() {
  const pairs=[{p:yourPoke(),who:'p'},{p:foePoke(),who:'e'}];
  for (const {p,who} of pairs) {
    if (p.fainted) continue;
    if (p.item?.effect==='leftovers') {
      const heal=Math.floor(p.maxHP/16); p.currentHP=Math.min(p.maxHP,p.currentHP+heal);
      updateHP(who,p);
    } else if (p.item?.effect==='blacksludge') {
      if (p.types?.includes('poison')) {
        const heal=Math.floor(p.maxHP/16); p.currentHP=Math.min(p.maxHP,p.currentHP+heal);
        updateHP(who,p);
      } else {
        const bsDmg=Math.floor(p.maxHP/8); p.currentHP=Math.max(0,p.currentHP-bsDmg);
        log(cap(p.name)+' was hurt by Black Sludge!'); updateHP(who,p); await wait(600);
        if (p.currentHP<=0) { p.fainted=true; flash(who+'-sprite'); log(cap(p.name)+' fainted!'); await wait(800); renderTeamIcons(); }
      }
    }
    if (p.item?.effect==='sitrusberry'&&!p.berryUsed&&p.currentHP/p.maxHP<0.5) {
      const heal=Math.floor(p.maxHP*0.25); p.currentHP=Math.min(p.maxHP,p.currentHP+heal);
      p.berryUsed=true; log(cap(p.name)+"'s Sitrus Berry restored some HP!"); updateHP(who,p); await wait(600);
    }
    // Grassy Terrain healing
    if (field.terrain==='grassy' && !p.types?.includes('flying')) {
      const heal=Math.floor(p.maxHP/16); p.currentHP=Math.min(p.maxHP,p.currentHP+heal);
      updateHP(who,p);
    }
    // Weather damage
    if (field.weather==='sand' && !['rock','steel','ground'].some(t=>p.types?.includes(t))) {
      const dmg=Math.floor(p.maxHP/16); p.currentHP=Math.max(0,p.currentHP-dmg);
      updateHP(who,p);
    }
    if (field.weather==='hail' && !p.types?.includes('ice')) {
      const dmg=Math.floor(p.maxHP/16); p.currentHP=Math.max(0,p.currentHP-dmg);

async function handleFaint(who) {
  if (who==='e') {
    const next=foeTeam.findIndex((p,i)=>i>foeIdx&&!p.fainted);
    if (next===-1) { log('You defeated the wild team! You win!'); renderTeamIcons(); return true; }
    foeIdx=next; foeLocked=null;
    log('Wild '+cap(foePoke().name)+' was sent out!'); await wait(600);
    renderActive(); renderTeamIcons(); return false;
  } else {
    const next=yourTeam.findIndex((p,i)=>i>yourIdx&&!p.fainted);
    if (next===-1) { log('All your Pokemon fainted! You lose!'); renderTeamIcons(); return true; }
    yourIdx=next; lockedMove=null;
    log('Go '+cap(yourPoke().name)+'!'); await wait(600);
    renderActive(); renderMoves(); renderTeamIcons(); return false;
  }
}

async function usePotion() {
  if (busy||potions<=0) return;
  const yp=yourPoke(); if(yp.fainted) return;
  busy=true; setAllDisabled(true);
  potions--;

  busy=false; setAllDisabled(false);
}
