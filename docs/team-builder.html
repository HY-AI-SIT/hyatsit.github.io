<script>
const TYPE_COLORS = {fire:'#F08030',water:'#6890F0',grass:'#78C850',electric:'#F8D030',psychic:'#F85888',ice:'#98D8D8',dragon:'#7038F8',dark:'#705848',fairy:'#EE99AC',normal:'#A8A878',fighting:'#C03028',poison:'#A040A0',ground:'#E0C068',flying:'#A890F0',bug:'#A8B820',rock:'#B8A038',ghost:'#705898',steel:'#B8B8D0'};

const ITEMS = [
  {name:'None',effect:'none',desc:'No held item.'},
  {name:'Leftovers',effect:'leftovers',desc:'Restores 1/16 max HP at the end of each turn.'},
  {name:'Life Orb',effect:'lifeorb',desc:'Boosts move power by 30%. Lose 10% max HP after attacking.'},
  {name:'Choice Band',effect:'choiceband',desc:'Boosts Attack by 50%. Locked to the first move used.'},
  {name:'Choice Specs',effect:'choicespecs',desc:'Boosts Sp. Atk by 50%. Locked to the first move used.'},
  {name:'Choice Scarf',effect:'choicescarf',desc:'Boosts Speed by 50%. Locked to the first move used.'},
  {name:'Sitrus Berry',effect:'sitrusberry',desc:'Restores 25% max HP when HP falls below 50%. One use.'},
  {name:'Rocky Helmet',effect:'rockyhelmet',desc:'Deals 1/6 max HP damage to attackers that make contact.'},
  {name:'Focus Sash',effect:'focussash',desc:'Survive any one-hit KO from full HP with 1 HP remaining. One use.'},
  {name:'Shell Bell',effect:'shellbell',desc:'Restores HP equal to 1/8 of the damage dealt.'},
  {name:'Assault Vest',effect:'assaultvest',desc:'Raises Sp. Def by 50%. Cannot use status moves.'},
  {name:'Eviolite',effect:'eviolite',desc:'Raises Defense and Sp. Def by 50% for unevolved Pokemon.'},
  {name:'Black Sludge',effect:'blacksludge',desc:'Heals 1/16 HP per turn for Poison types. Damages other types.'},
];

let currentPokemon = null;
let currentMoveList = [];
let currentMoves = [null,null,null,null];
let currentAbility = null;
let currentItem = ITEMS[0];
let team = [];
let activeMoveSlot = -1;
let moveCache = {};
let abilityCache = {};

try { team = JSON.parse(localStorage.getItem('pokeTeam') || '[]'); } catch(e) { team = []; }

function calcHP(base) { return Math.floor((2*base+31)*50/100)+50+10; }
function calcStat(base) { return Math.floor((Math.floor((2*base+31)*50/100)+5)); }
function cap(s) { return s ? s.charAt(0).toUpperCase()+s.slice(1).replace(/-/g,' ') : ''; }

async function loadPokemon() {
  const q = document.getElementById('poke-search').value.trim().toLowerCase();
  if (!q) return;
  const st = document.getElementById('search-status');
  st.textContent = 'Loading...';
  document.getElementById('poke-panel').style.display = 'none';
  try {
    const r = await fetch('https://pokeapi.co/api/v2/pokemon/' + q);
    if (!r.ok) throw new Error();
    const d = await r.json();
    const allMoves = d.moves.map(m => ({name:m.move.name, url:m.move.url}));
    const stats = {};
    d.stats.forEach(s => { stats[s.stat.name] = s.base_stat; });
    // Check if Pokemon can still evolve (for Eviolite)
    let canEvolve = false;
    try {
      const sr = await fetch(d.species.url);
      const sd = await sr.json();
      const er = await fetch(sd.evolution_chain.url);
      const ed = await er.json();
      function findSpecies(node, name) {
        if (node.species.name === name) return node;
        for (const e of node.evolves_to) { const f=findSpecies(e,name); if(f) return f; }
        return null;
      }
      const node = findSpecies(ed.chain, d.name) || findSpecies(ed.chain, sd.name);
      canEvolve = node ? node.evolves_to.length > 0 : false;
    } catch(e) { canEvolve = false; }
    currentPokemon = {
      id: d.id, name: d.name,
      sprite: d.sprites.front_default,
      backSprite: d.sprites.back_default || d.sprites.front_default,
      types: d.types.map(t => t.type.name),
      abilities: d.abilities.map(a => ({name:a.ability.name, url:a.ability.url, hidden:a.is_hidden})),
      stats, canEvolve,
      maxHP: calcHP(stats.hp||45),
      attack: calcStat(stats.attack||45),
      defense: calcStat(stats.defense||45),
      spAtk: calcStat(stats['special-attack']||45),
      spDef: calcStat(stats['special-defense']||45),
      speed: calcStat(stats.speed||45),
    };
    currentMoveList = allMoves;
    currentMoves = [null,null,null,null];
    currentAbility = currentPokemon.abilities[0];
    currentItem = ITEMS[0];
    st.textContent = '';
    renderPanel();
    document.getElementById('poke-panel').style.display = 'block';
    loadAbilityDesc(currentAbility);
  } catch(e) {
    st.textContent = 'Pokemon not found. Try a different name or number.';
  }
}

async function loadAbilityDesc(ability) {
  document.getElementById('ability-desc').textContent = 'Loading...';
  if (abilityCache[ability.name]) {
    ability.desc = abilityCache[ability.name];
    document.getElementById('ability-desc').textContent = ability.desc;
    return;
  }
  try {
    const r = await fetch(ability.url);
    const d = await r.json();
    const entry = d.effect_entries.find(e => e.language.name === 'en');
    ability.desc = entry ? entry.short_effect : 'No description available.';
    abilityCache[ability.name] = ability.desc;
    document.getElementById('ability-desc').textContent = ability.desc;
  } catch(e) { document.getElementById('ability-desc').textContent = 'No description available.'; }
}

function renderPanel() {
  const p = currentPokemon;
  document.getElementById('panel-sprite').src = p.sprite;
  document.getElementById('panel-name').textContent = cap(p.name) + ' #' + p.id;
  document.getElementById('panel-types').innerHTML = p.types.map(t=>`<span class="type-badge" style="background:${TYPE_COLORS[t]||'#888'}">${t}</span>`).join('');
  document.getElementById('panel-stats').innerHTML =
    `HP <b>${p.maxHP}</b> &nbsp; Atk <b>${p.attack}</b> &nbsp; Def <b>${p.defense}</b><br>SpA <b>${p.spAtk}</b> &nbsp; SpD <b>${p.spDef}</b> &nbsp; Spe <b>${p.speed}</b>`;

  const abilEl = document.getElementById('ability-select');
  abilEl.innerHTML = p.abilities.map((a,i)=>`<option value="${i}">${cap(a.name)}${a.hidden?' (Hidden)':''}</option>`).join('');
  abilEl.onchange = () => {
    currentAbility = p.abilities[parseInt(abilEl.value)];
    loadAbilityDesc(currentAbility);
  };

  const itemEl = document.getElementById('item-select');
  itemEl.innerHTML = ITEMS.map((item,i)=>`<option value="${i}">${item.name}</option>`).join('');
  itemEl.onchange = () => {
    currentItem = ITEMS[parseInt(itemEl.value)];
    let desc = currentItem.desc;
    if (currentItem.effect==='eviolite'&&!currentPokemon.canEvolve) desc += ' ⚠ This Pokemon cannot evolve further — Eviolite will have no effect.';
    document.getElementById('item-desc').textContent = desc;
  };
  document.getElementById('item-desc').textContent = ITEMS[0].desc;

  renderMoveSlots();
  document.getElementById('move-picker').style.display = 'none';
}

function renderMoveSlots() {
  for (let i = 0; i < 4; i++) {
    const m = currentMoves[i];
    const el = document.getElementById('mslot-' + i);
    if (m) {
      const color = TYPE_COLORS[m.type] || '#888';
      el.innerHTML = `<div class="mslot-name">${cap(m.name)}</div>
        <div class="mslot-meta" style="color:${color}">${m.type} · ${m.damageClass} · ${m.power?m.power+' pwr':'status'} · ${m.accuracy?m.accuracy+'% acc':'—'} · PP ${m.pp}</div>
        <div class="mslot-desc">${m.desc}</div>`;
      el.classList.add('filled');
    } else {
      el.innerHTML = `<span class="mslot-empty">Click to add Move ${i+1}</span>`;
      el.classList.remove('filled');
    }
  }
}

function openMovePicker(slot) {
  activeMoveSlot = slot;
  const picker = document.getElementById('move-picker');
  picker.style.display = 'block';
  document.getElementById('move-filter').value = '';
  renderMovePickerList('');
  document.getElementById('move-filter').focus();
}

function renderMovePickerList(filter) {
  const f = filter.toLowerCase().replace(/ /g,'-');
  const filtered = currentMoveList.filter(m => m.name.includes(f)).slice(0, 60);
  const list = document.getElementById('move-list');
  list.innerHTML = filtered.map(m => {
    const cached = moveCache[m.name];
    const meta = cached ? `<span class="mli-meta" style="color:${TYPE_COLORS[cached.type]||'#888'}">${cached.type} · ${cached.power||'status'}</span>` : `<span class="mli-meta" style="color:#ccc">click to load</span>`;
    return `<div class="move-list-item" onclick="selectMove('${m.name}','${m.url}')"><span class="mli-name">${cap(m.name)}</span>${meta}</div>`;
  }).join('');
  if (!filtered.length) list.innerHTML = '<div style="padding:8px;font-size:8px;color:#888">No moves found</div>';
}

async function selectMove(name, url) {
  const el = document.getElementById('mslot-' + activeMoveSlot);
  el.innerHTML = '<span class="mslot-empty">Loading...</span>';
  document.getElementById('move-picker').style.display = 'none';

  if (moveCache[name]) {
    currentMoves[activeMoveSlot] = moveCache[name];
    renderMoveSlots();
    return;
  }
  try {
    const r = await fetch(url);
    const d = await r.json();
    const effEntry = d.effect_entries ? d.effect_entries.find(e => e.language.name === 'en') : null;
    const flavorEntry = d.flavor_text_entries ? [...d.flavor_text_entries].reverse().find(e => e.language.name === 'en') : null;
    let desc = effEntry ? effEntry.short_effect.replace(/\$effect_chance/g, d.effect_chance||'').trim()
                        : (flavorEntry ? flavorEntry.flavor_text.replace(/\n/g,' ') : 'No description.');
    const move = {
      name: d.name, type: d.type.name, power: d.power, accuracy: d.accuracy,
      pp: d.pp, maxPP: d.pp, damageClass: d.damage_class.name, desc,
      statChanges: (d.stat_changes||[]).map(sc=>({stat:sc.stat.name,change:sc.change})),
      metaCategory: d.meta?.category?.name||'', moveTarget: d.target?.name||'selected-pokemon', heal: d.meta?.healing||0,
      statChangeToSelf: d.target?.name==='user',
    };
    moveCache[name] = move;
    currentMoves[activeMoveSlot] = move;
    renderMoveSlots();
  } catch(e) {
    currentMoves[activeMoveSlot] = {name,type:'normal',power:40,accuracy:100,pp:10,maxPP:10,damageClass:'physical',desc:'Move data unavailable.'};
    renderMoveSlots();
  }
}

function addToTeam() {
  const st = document.getElementById('add-status');
  if (!currentPokemon) { st.textContent = 'Search for a Pokemon first.'; return; }
  const moves = currentMoves.filter(m => m !== null);
  if (!moves.length) { st.textContent = 'Add at least one move!'; return; }
  if (team.length >= 6) { st.textContent = 'Team is full! Remove a Pokemon first.'; return; }
  const poke = {
    ...currentPokemon,
    moves: moves.map(m => ({...m, pp: m.maxPP, maxPP: m.maxPP})),
    ability: {...currentAbility},
    item: {...currentItem},
    currentHP: currentPokemon.maxHP,
  };
  team.push(poke);
  saveTeam();
  renderTeamSlots();
  st.textContent = cap(currentPokemon.name) + ' added to team!';
  setTimeout(() => { st.textContent = ''; }, 2000);
}

function removeFromTeam(i) {
  team.splice(i, 1);
  saveTeam();
  renderTeamSlots();
}

function saveTeam() {
  try { localStorage.setItem('pokeTeam', JSON.stringify(team)); } catch(e) {}
}

function renderTeamSlots() {
  const grid = document.getElementById('team-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const slot = document.createElement('div');
    slot.className = 'team-slot' + (team[i] ? ' filled' : '');
    if (team[i]) {
      const p = team[i];
      slot.innerHTML = `<button class="ts-remove" onclick="removeFromTeam(${i})">✕</button>
        <img src="${p.sprite}" style="width:48px;height:48px;image-rendering:pixelated">
        <div class="ts-name">${cap(p.name)}</div>
        <div class="ts-item">${p.item.name !== 'None' ? p.item.name : ''}</div>`;
    } else {
      slot.innerHTML = '<span class="ts-empty">' + (i+1) + '</span>';
    }
    grid.appendChild(slot);
  }
}

document.getElementById('poke-search').addEventListener('keydown', e => { if (e.key === 'Enter') loadPokemon(); });
renderTeamSlots();
